benchmark_id: tabpfn_frozen_repeated
task_type: right_censored_survival
split_strategy: repeated_nested_cv
outer_folds: 3
outer_repeats: 3
inner_folds: 2
seeds:
  - 11
  - 22
  - 33
primary_metric: uno_c
profile: standard
comparison_modes:
  - no_hpo
secondary_metrics:
  - harrell_c
  - ibs
  - td_auc
execution:
  n_jobs: 1
hpo:
  enabled: false
  max_trials: 0
  timeout_seconds: 60
  sampler: random
  pruner: none
  n_startup_trials: 0
  method_overrides:
    tabpfn_survival_classifier:
      enabled: false
      search_space: null
      default_params:
        n_estimators: 1
        n_estimators_final_inference: 1
        backbone_task: classification_event
        backbone_training: frozen
        hidden_layers: "64"
        dropout: 0.0
        max_epochs: 10
        patience: 3
    tabpfn_survival_regressor:
      enabled: false
      search_space: null
      default_params:
        n_estimators: 1
        n_estimators_final_inference: 1
        backbone_task: regression_time
        backbone_training: frozen
        hidden_layers: "64"
        dropout: 0.0
        max_epochs: 10
        patience: 3
datasets:
  - nwtco
  - gbsg2
  - aids
  - metabric
  - support
  - whas500
methods:
  - coxph
  - rsf
  - tabpfn_survival_classifier
  - tabpfn_survival_regressor
notes: >
  Repeated standard-dataset frozen TabPFN benchmark for a more stable Elo
  estimate than the smoke profile. It keeps backbones frozen, trains compact
  Cox heads only, and runs sequentially to avoid overcommitting local CPU/RAM.
