benchmark_id: standard_v1
task_type: right_censored_survival
split_strategy: repeated_nested_cv
outer_folds: 5
outer_repeats: 3
inner_folds: 3
seeds: [11, 22, 33, 44, 55]
primary_metric: uno_c
profile: standard
secondary_metrics:
  - harrell_c
  - ibs
  - td_auc
autogluon:
  enabled: false
  presets: medium
  time_limit_seconds: null
  hyperparameter_tune_kwargs: null
  num_bag_folds: 0
  num_stack_levels: 0
  refit_full: false
hpo:
  enabled: true
  max_trials: 30
  timeout_seconds: 1800
  sampler: tpe
  pruner: median
  n_startup_trials: 10
decision_curve:
  thresholds: [0.1, 0.2, 0.3]
robustness:
  enabled: false
  tracks: [baseline]
  severity_levels: [0.05]
time_horizons_quantiles: [0.25, 0.5, 0.75]
datasets:
  - support
  - metabric
  - aids
  - gbsg2
  - flchain
  - whas500
methods:
  - coxph
  - coxnet
  - rsf
  - deepsurv
