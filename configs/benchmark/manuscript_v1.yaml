benchmark_id: manuscript_v1
task_type: right_censored_survival
split_strategy: repeated_nested_cv
outer_folds: 5
outer_repeats: 3
inner_folds: 3
seeds: [11, 22, 33, 44, 55]
primary_metric: uno_c
profile: manuscript
comparison_modes: [no_hpo]
secondary_metrics:
  - harrell_c
  - ibs
  - td_auc
  - brier
  - calibration
  - net_benefit
autogluon:
  enabled: false
  presets: medium
  time_limit_seconds: null
  hyperparameter_tune_kwargs: null
  num_bag_folds: 0
  num_stack_levels: 0
  refit_full: false
time_horizons_quantiles: [0.25, 0.5, 0.75]
datasets:
  - support
  - metabric
  - aids
  - gbsg2
  - flchain
  - whas500
methods:
  - coxph
  - coxnet
  - weibull_aft
  - lognormal_aft
  - loglogistic_aft
  - aalen_additive
  - fast_survival_svm
  - rsf
  - extra_survival_trees
  - gradient_boosting_survival
  - componentwise_gradient_boosting
  - xgboost_cox
  - xgboost_aft
  - catboost_cox
  - catboost_survival_aft
  - deepsurv
  - deepsurv_moco
  - logistic_hazard
  - pmf
  - mtlr
  - deephit_single
  - pchazard
  - cox_time
notes: Main-paper native default/no-HPO benchmark across balanced survival model families. Treat HPO, AutoGluon, and foundation variants as separate sensitivity, appendix, or exploratory tracks unless explicitly promoted.
