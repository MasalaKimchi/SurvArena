benchmark_id: manuscript_autogluon_foundation_v1
task_type: right_censored_survival
split_strategy: repeated_nested_cv
outer_folds: 5
outer_repeats: 3
inner_folds: 3
seeds: [11, 22, 33, 44, 55]
primary_metric: uno_c
profile: manuscript
comparison_modes: [no_hpo]
secondary_metrics:
  - harrell_c
  - ibs
  - td_auc
  - brier
  - calibration
  - net_benefit
autogluon:
  enabled: true
  presets: null
  time_limit_seconds: 120
  hyperparameter_tune_kwargs: null
  num_bag_folds: 0
  num_stack_levels: 0
  refit_full: false
hpo:
  enabled: false
  max_trials: 0
  timeout_seconds: 120
  sampler: random
  pruner: none
  n_startup_trials: 0
  method_overrides:
    tabicl_survival:
      enabled: false
      search_space: null
      default_params:
        n_estimators: 1
        horizon_quantiles: "0.25-0.5-0.75"
        min_known_per_horizon: 20
    tabm_survival:
      enabled: false
      search_space: null
      default_params:
        time_limit: 120
    realtabpfn_survival:
      enabled: false
      search_space: null
      default_params:
        time_limit: 120
time_horizons_quantiles: [0.25, 0.5, 0.75]
exports:
  profile: core_csv
  manuscript_artifact_layout: compact
datasets:
  - support
  - metabric
  - nwtco
  - aids
  - gbsg2
  - flchain
  - whas500
methods:
  - tabicl_survival
  - tabm_survival
  - realtabpfn_survival
notes: >
  Manuscript-grade no-HPO clinical benchmark for newly wired tabular foundation
  survival adapters. TabICL uses direct horizon classifiers; remaining
  AutoGluon-backed adapters stay bounded. Mitra is excluded because local RAM/CPU
  use can exceed the conventional model wall-clock budget.
