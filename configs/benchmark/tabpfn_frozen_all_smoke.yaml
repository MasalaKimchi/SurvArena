benchmark_id: tabpfn_frozen_all_smoke
task_type: right_censored_survival
split_strategy: repeated_nested_cv
outer_folds: 2
outer_repeats: 1
inner_folds: 2
seeds: [11]
primary_metric: uno_c
profile: smoke
comparison_modes: [no_hpo]
secondary_metrics:
  - harrell_c
  - ibs
  - td_auc
execution:
  n_jobs: 1
hpo:
  enabled: false
  max_trials: 0
  timeout_seconds: 60
  sampler: random
  pruner: none
  n_startup_trials: 0
  method_overrides:
    tabpfn_survival:
      enabled: false
      search_space: null
      default_params:
        n_estimators: 1
        horizon_quantiles: "0.25-0.5-0.75"
        min_known_per_horizon: 20
datasets:
  - nwtco
  - gbsg2
  - aids
  - metabric
  - support
  - whas500
methods:
  - coxph
  - rsf
  - tabpfn_survival
notes: >
  Sequential all-standard-dataset smoke for constructing a first frozen-TabPFN
  Elo table. It keeps TabPFN backbones frozen, trains horizon classifiers,
  and includes CoxPH/RSF paired baselines on the same folds.
