benchmark_id: manuscript_genomics_foundation_hazard_1000_features_v1
task_type: right_censored_survival
split_strategy: repeated_nested_cv
outer_folds: 5
outer_repeats: 3
inner_folds: 3
seeds:
- 11
- 22
- 33
- 44
- 55
primary_metric: uno_c
profile: manuscript
comparison_modes:
- no_hpo
validation_diagnostics:
  enabled: true
  inner_folds: 3
secondary_metrics:
- harrell_c
- ibs
- td_auc
- brier
- calibration
- net_benefit
autogluon:
  enabled: true
  presets: null
  time_limit_seconds: 120
  hyperparameter_tune_kwargs: null
  num_bag_folds: 0
  num_stack_levels: 0
  refit_full: false
hpo:
  enabled: false
  max_trials: 0
  timeout_seconds: 120
  sampler: random
  pruner: none
  n_startup_trials: 0
  method_overrides:
    tabicl_survival:
      enabled: false
      search_space: null
      default_params:
        n_estimators: 1
        n_intervals: 5
        min_rows_per_interval: 20
        max_stacked_rows: 50000
    tabm_survival:
      enabled: false
      search_space: null
      default_params:
        time_limit: 120
        n_intervals: 5
        min_rows_per_interval: 20
        max_stacked_rows: 50000
        tabm_params:
          ag.max_memory_usage_ratio: 1.6
          lr: 0.001
          weight_decay: 0.001
          dropout: 0.2
          tabm_k: 16
          d_block: 256
          patience: 8
time_horizons_quantiles:
- 0.25
- 0.5
- 0.75
exports:
  profile: core_csv
  manuscript_artifact_layout: compact
datasets:
- tcga_brca_xena_1000
- tcga_luad_xena_1000
- tcga_kirc_xena_1000
- tcga_skcm_xena_1000
- tcga_ov_xena_1000
methods:
- tabicl_survival
- tabm_survival
notes: 'One-seed manuscript-style genomics diagnostic using top-variance 1000-gene TCGA Xena artifacts. Intended to test whether expanding from 500 to 1000 genes changes validation-test behavior or the relative ranking of pooled discrete-time hazard foundation adapters.

  '
