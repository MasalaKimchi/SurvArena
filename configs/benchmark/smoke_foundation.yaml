benchmark_id: smoke_foundation
task_type: right_censored_survival
split_strategy: repeated_nested_cv
outer_folds: 2
outer_repeats: 1
inner_folds: 2
seeds: [11]
primary_metric: uno_c
profile: smoke
secondary_metrics:
  - harrell_c
  - ibs
  - td_auc
  - brier
  - calibration
  - net_benefit
autogluon:
  enabled: false
  presets: medium
  time_limit_seconds: null
  hyperparameter_tune_kwargs: null
  num_bag_folds: 0
  num_stack_levels: 0
  refit_full: false
hpo:
  enabled: false
  max_trials: 4
  timeout_seconds: 120
  sampler: random
  pruner: none
  n_startup_trials: 2
decision_curve:
  thresholds: [0.2]
robustness:
  enabled: false
  tracks: [baseline]
  severity_levels: [0.05]
time_horizons_quantiles: [0.25, 0.5, 0.75]
exports:
  manuscript_artifact_layout: compact
datasets:
  - support
  - metabric
  - aids
  - gbsg2
  - flchain
  - whas500
methods:
  - tabpfn_survival
  - mitra_survival
notes: >
  Same budget and data/split contract as smoke.yaml (2×2 nested CV, seed 11, all standard
  datasets), limited to tabular foundation adapters. Requires optional foundation extras
  and (for TabPFN) HuggingFace auth if checkpoints are gated.
