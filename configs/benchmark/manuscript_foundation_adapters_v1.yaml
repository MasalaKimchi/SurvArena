benchmark_id: manuscript_foundation_adapters_v1
task_type: right_censored_survival
split_strategy: repeated_nested_cv
outer_folds: 5
outer_repeats: 3
inner_folds: 3
seeds: [11, 22, 33, 44, 55]
primary_metric: uno_c
profile: manuscript
comparison_modes: [no_hpo]
secondary_metrics:
  - harrell_c
  - ibs
  - td_auc
  - brier
  - calibration
  - net_benefit
autogluon:
  enabled: true
  presets: null
  time_limit_seconds: 120
  hyperparameter_tune_kwargs: null
  num_bag_folds: 0
  num_stack_levels: 0
  refit_full: false
hpo:
  enabled: false
  max_trials: 0
  timeout_seconds: 120
  sampler: random
  pruner: none
  n_startup_trials: 0
  method_overrides:
    tabpfn_survival:
      enabled: false
      search_space: null
      default_params:
        n_estimators: 1
        horizon_quantiles: "0.25-0.5-0.75"
        min_known_per_horizon: 20
    tabpfn_discrete_hazard_survival:
      enabled: false
      search_space: null
      default_params:
        n_estimators: 1
        n_intervals: 5
        min_rows_per_interval: 20
        max_stacked_rows: 50000
    tabicl_survival:
      enabled: false
      search_space: null
      default_params:
        n_estimators: 1
        horizon_quantiles: "0.25-0.5-0.75"
        min_known_per_horizon: 20
    tabicl_discrete_hazard_survival:
      enabled: false
      search_space: null
      default_params:
        n_estimators: 1
        n_intervals: 5
        min_rows_per_interval: 20
        max_stacked_rows: 50000
    tabm_survival:
      enabled: false
      search_space: null
      default_params:
        time_limit: 120
    tabm_discrete_hazard_survival:
      enabled: false
      search_space: null
      default_params:
        time_limit: 120
        n_intervals: 5
        min_rows_per_interval: 20
        max_stacked_rows: 50000
    realtabpfn_survival:
      enabled: false
      search_space: null
      default_params:
        time_limit: 120
    realtabpfn_discrete_hazard_survival:
      enabled: false
      search_space: null
      default_params:
        time_limit: 120
        n_intervals: 5
        min_rows_per_interval: 20
        max_stacked_rows: 50000
time_horizons_quantiles: [0.25, 0.5, 0.75]
exports:
  profile: core_csv
  manuscript_artifact_layout: compact
datasets:
  - support
  - metabric
  - nwtco
  - aids
  - gbsg2
  - flchain
  - whas500
  - tcga_brca_xena
  - tcga_luad_xena
  - tcga_kirc_xena
  - tcga_ov_xena
  - tcga_skcm_xena
methods:
  - coxph
  - coxnet
  - rsf
  - extra_survival_trees
  - gradient_boosting_survival
  - componentwise_gradient_boosting
  - xgboost_cox
  - xgboost_aft
  - catboost_cox
  - catboost_survival_aft
  - deepsurv
  - logistic_hazard
  - pmf
  - mtlr
  - deephit_single
  - pchazard
  - cox_time
  - tabpfn_survival
  - tabpfn_discrete_hazard_survival
  - tabicl_survival
  - tabicl_discrete_hazard_survival
  - tabm_survival
  - tabm_discrete_hazard_survival
  - realtabpfn_survival
  - realtabpfn_discrete_hazard_survival
notes: >
  Manuscript-grade comparison of legacy cumulative-horizon foundation adapters
  against pooled discrete-time hazard foundation adapters under identical
  repeated nested cross-validation splits across configured clinical and
  genomics survival datasets.
