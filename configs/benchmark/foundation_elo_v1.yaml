benchmark_id: foundation_elo_v1
task_type: right_censored_survival
split_strategy: repeated_nested_cv
outer_folds: 3
outer_repeats: 3
inner_folds: 2
seeds:
  - 11
  - 22
  - 33
primary_metric: uno_c
profile: standard
comparison_modes:
  - no_hpo
secondary_metrics:
  - harrell_c
  - ibs
  - td_auc
execution:
  n_jobs: 1
autogluon:
  enabled: true
  presets: null
  time_limit_seconds: 120
  hyperparameter_tune_kwargs: null
  num_bag_folds: 0
  num_stack_levels: 0
  refit_full: false
hpo:
  enabled: false
  max_trials: 0
  timeout_seconds: 120
  sampler: random
  pruner: none
  n_startup_trials: 0
  method_overrides:
    tabpfn_survival:
      enabled: false
      search_space: null
      default_params:
        n_estimators: 1
        horizon_quantiles: "0.25-0.5-0.75"
        min_known_per_horizon: 20
    mitra_survival_frozen:
      enabled: false
      search_space: null
      default_params:
        time_limit: 120
        mitra_params:
          fine_tune: false
          ag.max_memory_usage_ratio: 1.3
datasets:
  - nwtco
  - gbsg2
  - aids
  - metabric
  - support
  - whas500
methods:
  - coxph
  - rsf
  - xgboost_cox
  - xgboost_aft
  - catboost_cox
  - catboost_survival_aft
  - tabpfn_survival
  - mitra_survival_frozen
notes: >
  Unified no-HPO Elo expansion track for budget-matched tabular foundation
  adapters. The main track includes frozen/horizon-head variants only.
  Full backbone fine-tuning is intentionally excluded because it can exceed
  the conventional model wall-clock budget on CPU-only runs.
