benchmark_id: tabarena_like_hpo_v1
task_type: right_censored_survival
split_strategy: repeated_nested_cv
outer_folds: 5
outer_repeats: 3
inner_folds: 5
seeds: [11, 22, 33]
primary_metric: uno_c
profile: cloud_hpo
comparison_modes: [no_hpo, hpo]
secondary_metrics: [harrell_c, ibs, td_auc, brier, calibration, net_benefit]
execution:
  n_jobs: 1
autogluon:
  enabled: false
  presets: medium
  time_limit_seconds: null
  hyperparameter_tune_kwargs: null
  num_bag_folds: 0
  num_stack_levels: 0
  refit_full: false
hpo:
  enabled: true
  max_trials: 100
  timeout_seconds: 3600
  sampler: tpe
  pruner: median
  n_startup_trials: 20
  method_overrides:
    coxph: {max_trials: 100, timeout_seconds: 1800, n_startup_trials: 20, hpo_budget_tier: full, hpo_config_target: 100}
    coxnet: {max_trials: 100, timeout_seconds: 1800, n_startup_trials: 20, hpo_budget_tier: full, hpo_config_target: 100}
    weibull_aft: {max_trials: 75, timeout_seconds: 1800, n_startup_trials: 15, hpo_budget_tier: full, hpo_config_target: 75}
    lognormal_aft: {max_trials: 75, timeout_seconds: 1800, n_startup_trials: 15, hpo_budget_tier: full, hpo_config_target: 75}
    loglogistic_aft: {max_trials: 75, timeout_seconds: 1800, n_startup_trials: 15, hpo_budget_tier: full, hpo_config_target: 75}
    aalen_additive: {max_trials: 50, timeout_seconds: 1800, n_startup_trials: 12, hpo_budget_tier: reduced, hpo_config_target: 75}
    fast_survival_svm:
      max_trials: 50
      timeout_seconds: 2400
      n_startup_trials: 12
      hpo_budget_tier: reduced
      hpo_config_target: 100
      hpo_cap_reason: capped below full tabular target due SVM runtime scaling
    rsf: {max_trials: 100, timeout_seconds: 3600, n_startup_trials: 20, hpo_budget_tier: full, hpo_config_target: 100}
    extra_survival_trees: {max_trials: 100, timeout_seconds: 3600, n_startup_trials: 20, hpo_budget_tier: full, hpo_config_target: 100}
    gradient_boosting_survival:
      max_trials: 50
      timeout_seconds: 3600
      n_startup_trials: 12
      hpo_budget_tier: capped
      hpo_config_target: 150
      hpo_cap_reason: slow sklearn boosting; capped for cloud shard tractability
    componentwise_gradient_boosting:
      max_trials: 25
      timeout_seconds: 3600
      n_startup_trials: 8
      hpo_budget_tier: capped
      hpo_config_target: 150
      hpo_cap_reason: very slow componentwise boosting; capped for cloud shard tractability
    xgboost_cox: {max_trials: 150, timeout_seconds: 3600, n_startup_trials: 25, hpo_budget_tier: full, hpo_config_target: 150}
    xgboost_aft: {max_trials: 150, timeout_seconds: 3600, n_startup_trials: 25, hpo_budget_tier: full, hpo_config_target: 150}
    catboost_cox: {max_trials: 150, timeout_seconds: 3600, n_startup_trials: 25, hpo_budget_tier: full, hpo_config_target: 150}
    catboost_survival_aft: {max_trials: 150, timeout_seconds: 3600, n_startup_trials: 25, hpo_budget_tier: full, hpo_config_target: 150}
    deepsurv: {max_trials: 50, timeout_seconds: 5400, n_startup_trials: 12, hpo_budget_tier: reduced, hpo_config_target: 100}
    deepsurv_moco:
      max_trials: 15
      timeout_seconds: 3600
      n_startup_trials: 5
      hpo_budget_tier: capped
      hpo_config_target: 50
      hpo_cap_reason: experimental contrastive adapter; capped below deep target
    logistic_hazard: {max_trials: 35, timeout_seconds: 3600, n_startup_trials: 10, hpo_budget_tier: reduced, hpo_config_target: 50}
    pmf: {max_trials: 35, timeout_seconds: 3600, n_startup_trials: 10, hpo_budget_tier: reduced, hpo_config_target: 50}
    mtlr: {max_trials: 35, timeout_seconds: 3600, n_startup_trials: 10, hpo_budget_tier: reduced, hpo_config_target: 50}
    deephit_single: {max_trials: 25, timeout_seconds: 3600, n_startup_trials: 8, hpo_budget_tier: capped, hpo_config_target: 50, hpo_cap_reason: slow deep adapter capped below deep target}
    pchazard: {max_trials: 35, timeout_seconds: 3600, n_startup_trials: 10, hpo_budget_tier: reduced, hpo_config_target: 50}
    cox_time: {max_trials: 25, timeout_seconds: 3600, n_startup_trials: 8, hpo_budget_tier: capped, hpo_config_target: 50, hpo_cap_reason: slow time-varying deep adapter capped below deep target}
decision_curve:
  thresholds: [0.1, 0.2, 0.3]
robustness:
  enabled: false
  tracks: [baseline]
  severity_levels: [0.05]
time_horizons_quantiles: [0.25, 0.5, 0.75]
datasets: [support, metabric, aids, gbsg2, flchain, whas500]
methods:
  - coxph
  - coxnet
  - weibull_aft
  - lognormal_aft
  - loglogistic_aft
  - aalen_additive
  - fast_survival_svm
  - rsf
  - extra_survival_trees
  - gradient_boosting_survival
  - componentwise_gradient_boosting
  - xgboost_cox
  - xgboost_aft
  - catboost_cox
  - catboost_survival_aft
  - deepsurv
  - deepsurv_moco
  - logistic_hazard
  - pmf
  - mtlr
  - deephit_single
  - pchazard
  - cox_time
notes: Codex Cloud / multi-day HPO profile. Launch as per-method shards and merge with scripts/merge_cloud_benchmark_shards.py.
