benchmark_id: tabpfn_retained_v1
task_type: right_censored_survival
split_strategy: repeated_nested_cv
outer_folds: 3
outer_repeats: 3
inner_folds: 2
seeds:
  - 11
  - 22
  - 33
primary_metric: uno_c
profile: standard
comparison_modes:
  - no_hpo
secondary_metrics:
  - harrell_c
  - ibs
  - td_auc
execution:
  n_jobs: 1
autogluon:
  enabled: false
  presets: null
  time_limit_seconds: 120
  hyperparameter_tune_kwargs: null
  num_bag_folds: 0
  num_stack_levels: 0
  refit_full: false
hpo:
  enabled: false
  max_trials: 0
  timeout_seconds: 120
  sampler: random
  pruner: none
  n_startup_trials: 0
  method_overrides:
    tabpfn_survival:
      enabled: false
      search_space: null
      default_params:
        n_estimators: 1
        horizon_quantiles: "0.25-0.5-0.75"
        min_known_per_horizon: 20
datasets:
  - support
  - metabric
  - aids
  - gbsg2
  - flchain
  - whas500
methods:
  - tabpfn_survival
notes: >
  Retained TabPFN horizon-adapter evidence track for the foundation roadmap.
  This config keeps matched splits and metric outputs for manuscript gating:
  ranking metrics, IBS/calibration, and censoring-stress diagnostics.
