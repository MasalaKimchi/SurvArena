benchmark_id: mitra_survival_no_hpo_smoke
task_type: right_censored_survival
split_strategy: repeated_nested_cv
outer_folds: 2
outer_repeats: 1
inner_folds: 2
seeds: [11]
primary_metric: uno_c
profile: smoke
comparison_modes: [no_hpo]
secondary_metrics:
  - harrell_c
  - ibs
  - td_auc
autogluon:
  enabled: true
  presets: null
  time_limit_seconds: 120
  hyperparameter_tune_kwargs: null
  num_bag_folds: 0
  num_stack_levels: 0
  refit_full: false
hpo:
  enabled: false
  method_overrides:
    mitra_survival:
      enabled: false
      search_space: null
      default_params:
        mitra_params:
          fine_tune: false
          ag.max_memory_usage_ratio: 1.3
        verbosity: 0
datasets:
  - whas500
methods:
  - coxph
  - rsf
  - mitra_survival
notes: >
  Bounded no-HPO Mitra tabular foundation smoke benchmark. CoxPH and RSF are
  included as paired baselines so Elo-style ratings have matched opponents.
  The Mitra cap is intentionally higher than the generic AutoGluon smoke cap
  because frozen Mitra initialization commonly consumes most of a 30-second
  budget even on tiny tabular data. The memory ratio override is scoped to this
  smoke so AutoGluon's CPU safety gate allows the frozen model to run on local
  machines with roughly 6-7 GB available memory.
