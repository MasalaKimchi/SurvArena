benchmark_id: manuscript_genomics_v1
task_type: right_censored_survival
split_strategy: repeated_nested_cv
outer_folds: 5
outer_repeats: 3
inner_folds: 3
seeds:
- 11
- 22
- 33
- 44
- 55
primary_metric: uno_c
profile: manuscript
comparison_modes:
- no_hpo
secondary_metrics:
- harrell_c
- ibs
- td_auc
- brier
- calibration
- net_benefit
autogluon:
  enabled: true
  presets: null
  time_limit_seconds: 120
  hyperparameter_tune_kwargs: null
  num_bag_folds: 0
  num_stack_levels: 0
  refit_full: false
hpo:
  enabled: false
  max_trials: 0
  timeout_seconds: 120
  sampler: random
  pruner: none
  n_startup_trials: 0
  method_overrides:
    tabpfn_survival:
      enabled: false
      search_space: null
      default_params:
        n_estimators: 1
        device: cpu
        predict_batch_size: 256
        n_intervals: 3
        min_rows_per_interval: 20
        max_stacked_rows: 100
    tabicl_survival:
      enabled: false
      search_space: null
      default_params:
        n_estimators: 1
        device: cpu
        predict_batch_size: 256
        n_intervals: 3
        min_rows_per_interval: 20
        max_stacked_rows: 100
    tabm_survival:
      enabled: false
      search_space: null
      default_params:
        time_limit: 30
        n_intervals: 3
        min_rows_per_interval: 20
        max_stacked_rows: 100
    realtabpfn_survival:
      enabled: false
      search_space: null
      default_params:
        time_limit: 1
        n_intervals: 3
        min_rows_per_interval: 20
        max_stacked_rows: 100
time_horizons_quantiles:
- 0.25
- 0.5
- 0.75
exports:
  profile: core_csv
  manuscript_artifact_layout: compact
datasets:
- tcga_brca_xena
- tcga_luad_xena
- tcga_kirc_xena
- tcga_skcm_xena
- tcga_ov_xena
methods:
- coxph
- coxnet
- weibull_aft
- lognormal_aft
- loglogistic_aft
- aalen_additive
- fast_survival_svm
- rsf
- extra_survival_trees
- gradient_boosting_survival
- componentwise_gradient_boosting
- xgboost_cox
- xgboost_aft
- catboost_cox
- catboost_survival_aft
- deepsurv
- deepsurv_moco
- logistic_hazard
- pmf
- mtlr
- deephit_single
- pchazard
- cox_time
- tabpfn_survival
- tabicl_survival
- tabm_survival
- realtabpfn_survival
notes: 'Genomics manuscript no-HPO benchmark across the same model families and split protocol as manuscript_v1, with a stricter CPU-bounded foundation policy: 3 intervals, 100 stacked rows, batched direct foundation prediction, a 30-second TabM fit budget, and a 1-second RealTabPFN fit budget. The dataset track contains five SurvBoard-aligned TCGA cohorts selected for benchmark prevalence, public Xena availability, event coverage, and cancer-type diversity. Duplicate cohort variants such as METABRIC cBioPortal are intentionally excluded.

  '
