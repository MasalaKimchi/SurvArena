benchmark_id: cloud_comprehensive_all_models_hpo
task_type: right_censored_survival
split_strategy: repeated_nested_cv
outer_folds: 5
outer_repeats: 3
inner_folds: 3
seeds: [11, 22, 33, 44, 55]
primary_metric: uno_c
secondary_metrics:
  - harrell_c
  - ibs
  - td_auc
  - brier
  - calibration
  - net_benefit
autogluon:
  enabled: true
  presets: best_quality
  time_limit_seconds: 10800
  hyperparameter_tune_kwargs:
    num_trials: 100
    timeout: 10800
  num_bag_folds: 5
  num_stack_levels: 1
  refit_full: true
time_horizons_quantiles: [0.25, 0.5, 0.75]
datasets:
  - support
  - metabric
  - aids
  - gbsg2
  - flchain
  - whas500
  - kkbox
methods:
  - coxph
  - coxnet
  - weibull_aft
  - lognormal_aft
  - loglogistic_aft
  - aalen_additive
  - fast_survival_svm
  - rsf
  - extra_survival_trees
  - gradient_boosting_survival
  - componentwise_gradient_boosting
  - xgboost_cox
  - xgboost_aft
  - catboost_cox
  - catboost_survival_aft
  - deepsurv
  - deepsurv_moco
  - logistic_hazard
  - pmf
  - mtlr
  - deephit_single
  - pchazard
  - cox_time
  - autogluon_survival
  - tabpfn_survival
  - mitra_survival
notes: Comprehensive cloud-scale benchmark for all built-in datasets and model adapters. AutoGluon receives explicit HPO; native adapters currently use default hyperparameters selected by inner-CV evaluation.
