benchmark_id: manuscript_hpo_v1
task_type: right_censored_survival
split_strategy: repeated_nested_cv
outer_folds: 5
outer_repeats: 3
inner_folds: 3
seeds: [11, 22, 33, 44, 55]
primary_metric: uno_c
profile: manuscript
comparison_modes: [hpo]
secondary_metrics:
  - harrell_c
  - ibs
  - td_auc
  - brier
  - calibration
  - net_benefit
autogluon:
  enabled: true
  presets: null
  time_limit_seconds: 120
  hyperparameter_tune_kwargs: null
  num_bag_folds: 0
  num_stack_levels: 0
  refit_full: false
hpo:
  enabled: true
  max_trials: 30
  timeout_seconds: 1800
  sampler: tpe
  pruner: median
  n_startup_trials: 10
  method_overrides:
    tabpfn_survival:
      enabled: false
      search_space: null
      default_params:
        n_estimators: 1
        horizon_quantiles: "0.25-0.5-0.75"
        min_known_per_horizon: 20
    tabicl_survival:
      enabled: false
      search_space: null
      default_params:
        n_estimators: 1
        horizon_quantiles: "0.25-0.5-0.75"
        min_known_per_horizon: 20
    tabm_survival:
      enabled: false
      search_space: null
      default_params:
        time_limit: 120
    realtabpfn_survival:
      enabled: false
      search_space: null
      default_params:
        time_limit: 120
time_horizons_quantiles: [0.25, 0.5, 0.75]
exports:
  profile: core_csv
  manuscript_artifact_layout: compact
datasets:
  - support
  - metabric
  - nwtco
  - aids
  - gbsg2
  - flchain
  - whas500
methods:
  - coxph
  - coxnet
  - weibull_aft
  - lognormal_aft
  - loglogistic_aft
  - aalen_additive
  - fast_survival_svm
  - rsf
  - extra_survival_trees
  - gradient_boosting_survival
  - componentwise_gradient_boosting
  - xgboost_cox
  - xgboost_aft
  - catboost_cox
  - catboost_survival_aft
  - deepsurv
  - deepsurv_moco
  - logistic_hazard
  - pmf
  - mtlr
  - deephit_single
  - pchazard
  - cox_time
  - tabpfn_survival
  - tabicl_survival
  - tabm_survival
  - realtabpfn_survival
notes: >
  Main-paper HPO benchmark across the same balanced native and foundation
  survival model families as manuscript_v1. Foundation adapters remain bounded
  and are excluded from HPO when full tuning would exceed the conventional
  model wall-clock budget on CPU/RAM-bounded runs.
