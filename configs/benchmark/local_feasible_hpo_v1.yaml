decision_curve:
  thresholds:
  - 0.2
robustness:
  enabled: false
  tracks:
  - baseline
  severity_levels:
  - 0.05
time_horizons_quantiles:
- 0.25
- 0.5
- 0.75
exports:
  profile: core_csv
  manuscript_artifact_layout: compact
datasets:
- support
- metabric
- aids
- gbsg2
- flchain
- whas500
