    pmf:
      max_trials: 1
      timeout_seconds: 75
      sampler: random
      pruner: none
      n_startup_trials: 1
      search_space: *id028
      default_params:
        hidden_layers: '64'
        activation: relu
        dropout: 0.1
        batch_norm: true
        optimizer: adamw
        lr: 0.001
        weight_decay: 0.0001
        batch_size: 128
        max_epochs: 50
        patience: 8
        device: cpu
        num_durations: 10
        duration_scheme: quantiles
    mtlr:
      max_trials: 1
      timeout_seconds: 75
      sampler: random
      pruner: none
      n_startup_trials: 1
      search_space: *id028
      default_params:
        hidden_layers: '64'
        activation: relu
        dropout: 0.1
        batch_norm: true
        optimizer: adamw
        lr: 0.001
        weight_decay: 0.0001
        batch_size: 128
        max_epochs: 50
        patience: 8
