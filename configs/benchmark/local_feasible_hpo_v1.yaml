notes: Local feasible all-native dual-mode HPO profile for an 11-core/18GB Mac. Keeps
  canonical method configs unchanged and narrows HPO through benchmark-level method_overrides.
  Foundation and AutoGluon adapters are excluded from this native local profile. Deep-method
  default_params are also resource-bounded in this local profile to keep no-HPO and
  HPO comparable under laptop constraints.
