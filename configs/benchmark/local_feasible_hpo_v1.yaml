      search_space:
        hidden_layers: *id018
        activation: *id019
        dropout: *id020
        batch_norm: *id021
        optimizer: *id022
        lr: *id023
        weight_decay: *id024
        batch_size: *id025
        max_epochs: *id026
        patience: *id027
