benchmark_id: smoke_all_models_30min
task_type: right_censored_survival
split_strategy: repeated_nested_cv
outer_folds: 2
outer_repeats: 1
inner_folds: 2
seeds:
- 11
primary_metric: uno_c
profile: smoke
comparison_modes:
- no_hpo
- hpo
secondary_metrics:
- harrell_c
- ibs
- td_auc
- brier
- calibration
- net_benefit
autogluon:
  enabled: false
  presets: medium
  time_limit_seconds: null
  hyperparameter_tune_kwargs: null
  num_bag_folds: 0
  num_stack_levels: 0
  refit_full: false
hpo:
  enabled: true
  max_trials: 1
  timeout_seconds: 15
  sampler: random
  pruner: none
  n_startup_trials: 0
execution:
  n_jobs: 4
decision_curve:
  thresholds:
  - 0.2
robustness:
  enabled: false
  tracks:
  - baseline
  severity_levels:
  - 0.05
time_horizons_quantiles:
- 0.25
- 0.5
- 0.75
exports:
  profile: core_csv
  manuscript_artifact_layout: compact
datasets:
- aids
methods:
- xgboost_aft
notes: Single-method shard of smoke_all_models_30min for xgboost_aft. Uses the same
  benchmark_id, dataset, folds, seeds, HPO budget, and export profile as the all-model
  config so split definitions remain identical and fold results can be aggregated
  later.
