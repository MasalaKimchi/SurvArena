benchmark_id: local_mac_hpo_depth_v2
task_type: right_censored_survival
split_strategy: repeated_nested_cv
outer_folds: 3
outer_repeats: 2
inner_folds: 3
seeds: [11, 22]
primary_metric: uno_c
profile: local_hpo
comparison_modes: [no_hpo, hpo]
secondary_metrics: [harrell_c, ibs, td_auc]
execution:
  n_jobs: 1
autogluon:
  enabled: false
  presets: medium
  time_limit_seconds: null
  hyperparameter_tune_kwargs: null
  num_bag_folds: 0
  num_stack_levels: 0
  refit_full: false
hpo:
  enabled: true
  max_trials: 20
  timeout_seconds: 600
  sampler: tpe
  pruner: median
  n_startup_trials: 8
  method_overrides:
    coxph: {max_trials: 30, timeout_seconds: 300, n_startup_trials: 8, hpo_budget_tier: full, hpo_config_target: 30}
    coxnet: {max_trials: 30, timeout_seconds: 300, n_startup_trials: 8, hpo_budget_tier: full, hpo_config_target: 30}
    weibull_aft: {max_trials: 20, timeout_seconds: 300, n_startup_trials: 8, hpo_budget_tier: full, hpo_config_target: 20}
    lognormal_aft: {max_trials: 20, timeout_seconds: 300, n_startup_trials: 8, hpo_budget_tier: full, hpo_config_target: 20}
    loglogistic_aft: {max_trials: 20, timeout_seconds: 300, n_startup_trials: 8, hpo_budget_tier: full, hpo_config_target: 20}
    aalen_additive: {max_trials: 20, timeout_seconds: 300, n_startup_trials: 8, hpo_budget_tier: full, hpo_config_target: 20}
    fast_survival_svm:
      max_trials: 12
      timeout_seconds: 300
      n_startup_trials: 6
      hpo_budget_tier: reduced
      hpo_config_target: 20
      hpo_cap_reason: slow classical SVM under local CPU budget
    rsf: {max_trials: 25, timeout_seconds: 600, n_startup_trials: 8, hpo_budget_tier: full, hpo_config_target: 25}
    extra_survival_trees: {max_trials: 25, timeout_seconds: 600, n_startup_trials: 8, hpo_budget_tier: full, hpo_config_target: 25}
    gradient_boosting_survival:
      max_trials: 12
      timeout_seconds: 600
      n_startup_trials: 6
      hpo_budget_tier: capped
      hpo_config_target: 40
      hpo_cap_reason: slow sklearn boosting under local CPU budget
    componentwise_gradient_boosting:
      max_trials: 5
      timeout_seconds: 600
      n_startup_trials: 3
      hpo_budget_tier: capped
      hpo_config_target: 40
      hpo_cap_reason: very slow componentwise boosting under local CPU budget
    xgboost_cox: {max_trials: 40, timeout_seconds: 600, n_startup_trials: 10, hpo_budget_tier: full, hpo_config_target: 40}
    xgboost_aft: {max_trials: 40, timeout_seconds: 600, n_startup_trials: 10, hpo_budget_tier: full, hpo_config_target: 40}
    catboost_cox: {max_trials: 40, timeout_seconds: 600, n_startup_trials: 10, hpo_budget_tier: full, hpo_config_target: 40}
    catboost_survival_aft: {max_trials: 40, timeout_seconds: 600, n_startup_trials: 10, hpo_budget_tier: full, hpo_config_target: 40}
    deepsurv: {max_trials: 12, timeout_seconds: 900, n_startup_trials: 6, hpo_budget_tier: reduced, hpo_config_target: 25}
    deepsurv_moco:
      max_trials: 3
      timeout_seconds: 600
      n_startup_trials: 2
      hpo_budget_tier: capped
      hpo_config_target: 12
      hpo_cap_reason: experimental contrastive adapter under local CPU budget
    logistic_hazard: {max_trials: 8, timeout_seconds: 600, n_startup_trials: 4, hpo_budget_tier: reduced, hpo_config_target: 12}
    pmf: {max_trials: 8, timeout_seconds: 600, n_startup_trials: 4, hpo_budget_tier: reduced, hpo_config_target: 12}
    mtlr: {max_trials: 8, timeout_seconds: 600, n_startup_trials: 4, hpo_budget_tier: reduced, hpo_config_target: 12}
    deephit_single: {max_trials: 6, timeout_seconds: 600, n_startup_trials: 3, hpo_budget_tier: capped, hpo_config_target: 12, hpo_cap_reason: slow deep competing-risk style adapter}
    pchazard: {max_trials: 8, timeout_seconds: 600, n_startup_trials: 4, hpo_budget_tier: reduced, hpo_config_target: 12}
    cox_time: {max_trials: 6, timeout_seconds: 600, n_startup_trials: 3, hpo_budget_tier: capped, hpo_config_target: 12, hpo_cap_reason: slow time-varying deep adapter}
decision_curve:
  thresholds: [0.1, 0.2, 0.3]
robustness:
  enabled: false
  tracks: [baseline]
  severity_levels: [0.05]
time_horizons_quantiles: [0.25, 0.5, 0.75]
datasets: [support, metabric, aids, gbsg2, flchain, whas500]
methods:
  - coxph
  - coxnet
  - weibull_aft
  - lognormal_aft
  - loglogistic_aft
  - aalen_additive
  - fast_survival_svm
  - rsf
  - extra_survival_trees
  - gradient_boosting_survival
  - componentwise_gradient_boosting
  - xgboost_cox
  - xgboost_aft
  - catboost_cox
  - catboost_survival_aft
  - deepsurv
  - deepsurv_moco
  - logistic_hazard
  - pmf
  - mtlr
  - deephit_single
  - pchazard
  - cox_time
notes: Local overnight HPO-depth calibration profile. Use the cloud profile for TabArena-like extensive HPO.
