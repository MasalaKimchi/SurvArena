benchmark_id: manuscript_genomics_autogluon_foundation_v1
task_type: right_censored_survival
split_strategy: repeated_nested_cv
outer_folds: 5
outer_repeats: 3
inner_folds: 3
seeds:
- 11
- 22
- 33
- 44
- 55
primary_metric: uno_c
profile: manuscript
comparison_modes:
- no_hpo
secondary_metrics:
- harrell_c
- ibs
- td_auc
- brier
- calibration
- net_benefit
autogluon:
  enabled: true
  presets: null
  time_limit_seconds: 120
  hyperparameter_tune_kwargs: null
  num_bag_folds: 0
  num_stack_levels: 0
  refit_full: false
hpo:
  enabled: false
  max_trials: 0
  timeout_seconds: 120
  sampler: random
  pruner: none
  n_startup_trials: 0
  method_overrides:
    tabicl_survival:
      enabled: false
      search_space: null
      default_params:
        n_estimators: 1
        n_intervals: 5
        min_rows_per_interval: 20
        max_stacked_rows: 50000
    tabm_survival:
      enabled: false
      search_space: null
      default_params:
        time_limit: 120
        n_intervals: 5
        min_rows_per_interval: 20
        max_stacked_rows: 50000
    realtabpfn_survival:
      enabled: false
      search_space: null
      default_params:
        time_limit: 120
        n_intervals: 5
        min_rows_per_interval: 20
        max_stacked_rows: 9500
time_horizons_quantiles:
- 0.25
- 0.5
- 0.75
exports:
  profile: core_csv
  manuscript_artifact_layout: compact
datasets:
- tcga_brca_xena
- tcga_luad_xena
- tcga_kirc_xena
- tcga_skcm_xena
- tcga_ov_xena
methods:
- tabicl_survival
- tabm_survival
- realtabpfn_survival
notes: 'Manuscript-grade no-HPO genomics benchmark for newly wired tabular foundation survival adapters. Adapters use pooled discrete-time hazard heads with bounded foundation settings. Mitra is excluded because local RAM/CPU use can exceed the conventional model wall-clock budget.

  '
