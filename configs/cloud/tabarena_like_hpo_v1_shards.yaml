manifest_id: tabarena_like_hpo_v1_shards
benchmark_id: tabarena_like_hpo_v1
benchmark_config: configs/benchmark/tabarena_like_hpo_v1.yaml
output_root: results/cloud/tabarena_like_hpo_v1
merge_output_dir: results/cloud/tabarena_like_hpo_v1/combined
runner_script: scripts/run_cloud_benchmark_shard.py
merge_script: scripts/merge_cloud_benchmark_shards.py
resume: true
max_retries: 1
regenerate_splits: false
preflight:
  - python scripts/check_environment.py
  - python -m survarena.run_benchmark --config configs/benchmark/tabarena_like_hpo_v1.yaml --dry-run
smoke:
  command: >-
    python -m survarena.run_benchmark
    --config configs/benchmark/local_mac_hpo_depth_v2.yaml
    --dataset whas500
    --method coxph
    --limit-seeds 1
merge_command: >-
  python scripts/merge_cloud_benchmark_shards.py
  --shards-dir results/cloud/tabarena_like_hpo_v1
  --output-dir results/cloud/tabarena_like_hpo_v1/combined
  --primary-metric uno_c
shards:
  - method_id: coxph
    output_dir: results/cloud/tabarena_like_hpo_v1/coxph
    command: python scripts/run_cloud_benchmark_shard.py --config configs/benchmark/tabarena_like_hpo_v1.yaml --method coxph --output-dir results/cloud/tabarena_like_hpo_v1/coxph --resume --max-retries 1
  - method_id: coxnet
    output_dir: results/cloud/tabarena_like_hpo_v1/coxnet
