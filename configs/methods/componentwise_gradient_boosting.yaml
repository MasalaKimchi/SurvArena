method_id: componentwise_gradient_boosting
family: boosting
library: scikit-survival
search_space:
  learning_rate:
    type: float
    low: 0.01
    high: 0.3
    log: true
  n_estimators:
    type: int
    low: 100
    high: 800
  subsample:
    type: float
    low: 0.5
    high: 1.0
  dropout_rate:
    type: float
    low: 0.0
    high: 0.2
default_params:
  learning_rate: 0.05
  n_estimators: 300
  subsample: 1.0
  dropout_rate: 0.0
