method_id: tabpfn_survival_regressor
family: foundation
library: tabpfn + scikit-survival
display_name: TabPFN Survival Regressor Frozen
notes: Frozen TabPFN regressor surrogate with a compact Cox survival head for budget-matched Elo comparisons.
search_space: {}
default_params:
  n_estimators: 1
  fit_mode: fit_preprocessors
  model_version: v2.5
  checkpoint_path: null
  backbone_task: regression_time
  backbone_training: frozen
  aggregate_estimators: mean
  hidden_layers: "64"
  activation: relu
  dropout: 0.0
  optimizer: adamw
  lr: 0.001
  weight_decay: 0.0001
  batch_size: 128
  max_epochs: 25
  patience: 5
  grad_clip_value: 1.0
  n_estimators_finetune: 1
  n_estimators_final_inference: 1
  finetune_ctx_plus_query_samples: 10000
  finetune_ctx_query_split_ratio: 0.2
  device: auto
  seed: 0
