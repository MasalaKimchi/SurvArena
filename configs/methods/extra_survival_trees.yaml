method_id: extra_survival_trees
family: tree
library: scikit-survival
search_space:
  n_estimators:
    type: int
    low: 100
    high: 1000
  max_depth:
    type: int_or_none
    low: 3
    high: 30
  min_samples_split:
    type: int
    low: 2
    high: 30
  min_samples_leaf:
    type: int
    low: 1
    high: 20
  max_features:
    type: categorical
    choices: [sqrt, log2, null]
  bootstrap:
    type: categorical
    choices: [true, false]
default_params:
  n_estimators: 100
  max_depth: null
  min_samples_split: 6
  min_samples_leaf: 3
  max_features: sqrt
  bootstrap: true
