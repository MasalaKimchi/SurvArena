method_id: coxnet
family: classical
library: scikit-survival
search_space:
  n_alphas:
    type: int
    low: 30
    high: 200
  l1_ratio:
    type: float
    low: 0.05
    high: 1.0
  alpha_min_ratio:
    type: float
    low: 0.0001
    high: 0.1
    log: true
default_params:
  n_alphas: 100
  l1_ratio: 0.5
  alpha_min_ratio: 0.001
