method_id: deepsurv
family: deep
library: torchsurv
search_space:
  hidden_layers:
    type: categorical
    choices: ["64", "128", "256", "128-64", "256-128", "256-128-64"]
  activation:
    type: categorical
    choices: [relu, selu, gelu]
  dropout:
    type: float
    low: 0.0
    high: 0.5
  batch_norm:
    type: categorical
    choices: [true, false]
  optimizer:
    type: categorical
    choices: [adamw, adam]
  lr:
    type: float
    low: 0.0001
    high: 0.005
    log: true
  weight_decay:
    type: float
    low: 0.0000001
    high: 0.01
    log: true
  batch_size:
    type: categorical
    choices: [64, 128, 256]
  max_epochs:
    type: int
    low: 100
    high: 300
  patience:
    type: int
    low: 10
    high: 40
default_params:
  hidden_layers: "128-64"
  activation: relu
  dropout: 0.1
  batch_norm: true
  optimizer: adamw
  lr: 0.001
  weight_decay: 0.0001
  batch_size: 128
  max_epochs: 200
  patience: 20
  seed: 0
  device: auto
