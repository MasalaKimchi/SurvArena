method_id: tabicl_discrete_hazard_survival
family: foundation
library: tabicl
display_name: TabICL Discrete Hazard Survival
notes: >
  Pooled discrete-time hazard adapter for TabICL. It trains one frozen
  classifier on patient-interval rows with training-derived time features.
search_space:
  n_estimators:
    type: categorical
    choices: [1, 4]
  n_intervals:
    type: categorical
    choices: [3, 5, 10]
  subject_weighting:
    type: categorical
    choices: [normalized, none]
  aggregate_risk:
    type: categorical
    choices: [cumulative_event_probability_at_last, mean_cumulative_event_probability]
  time_feature_set:
    type: categorical
    choices: [minimal, km]
default_params:
  n_estimators: 1
  batch_size: 8
  checkpoint_version: tabicl-classifier-v1.1-0506.ckpt
  time_grid: event_quantile
  n_intervals: 5
  horizon_quantiles: null
  min_events_per_interval: 5
  min_rows_per_interval: 20
  max_stacked_rows: 50000
  subject_weighting: normalized
  censoring_weighting: none
  aggregate_risk: cumulative_event_probability_at_last
  time_feature_set: km
  device: null
  use_amp: false
  allow_auto_download: true
  seed: 0
  predict_batch_size: null
