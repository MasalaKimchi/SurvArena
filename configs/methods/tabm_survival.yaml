method_id: tabm_survival
family: foundation
library: autogluon.tabular
display_name: TabM Event-Risk Survival
notes: >
  AutoGluon TABM event-risk adapter. It trains TABM as a binary event
  classifier and calibrates survival curves with a training-side Breslow
  baseline.
search_space:
  time_limit:
    type: categorical
    choices: [60, 120, 300]
default_params:
  presets: null
  time_limit: 120
  tabm_params: {}
  num_bag_folds: 0
  num_stack_levels: 0
  refit_full: false
  verbosity: 0
