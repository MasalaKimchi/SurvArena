method_id: xgbse_kaplan_neighbors
family: boosting
library: xgbse
display_name: XGBSE Kaplan-neighbors survival curves
notes: >
  Optional XGBSE adapter using nearest-neighbor Kaplan-Meier curves from
  XGBoost leaf embeddings. Keep out of maintained benchmark configs until the
  xgbse package supports the repository's pinned xgboost major version.
search_space:
  learning_rate:
    type: float
    low: 0.01
    high: 0.2
    log: true
  num_boost_round:
    type: int
    low: 100
    high: 500
  max_depth:
    type: int
    low: 2
    high: 8
  min_child_weight:
    type: float
    low: 1.0
    high: 30.0
    log: true
  subsample:
    type: float
    low: 0.5
    high: 1.0
  colsample_bynode:
    type: float
    low: 0.5
    high: 1.0
  reg_lambda:
    type: float
    low: 0.0001
    high: 10.0
    log: true
  reg_alpha:
    type: float
    low: 0.00000001
    high: 1.0
    log: true
  n_neighbors:
    type: int
    low: 10
    high: 80
  rate_drop:
    type: float
    low: 0.0
    high: 0.3
default_params:
  learning_rate: 0.05
  num_boost_round: 300
  max_depth: 4
  min_child_weight: 10.0
  subsample: 0.8
  colsample_bynode: 0.8
  reg_lambda: 1.0
  reg_alpha: 0.0
  max_bin: 256
  tree_method: hist
  device: cpu
  booster: dart
  normalize_type: tree
  rate_drop: 0.1
  skip_drop: 0.0
  n_neighbors: 30
  radius: null
  enable_categorical: false
  early_stopping_rounds: 25
  risk_time_bins: 32
  seed: 0
