method_id: realtabpfn_survival
family: foundation
library: autogluon.tabular
display_name: RealTabPFN-V2 Horizon Survival
notes: >
  Censored-aware AutoGluon REALTABPFN-V2 horizon adapter. It trains one binary
  event classifier per survival horizon using only rows with known event status
  at that horizon and reconstructs monotone survival curves from cumulative
  event probabilities.
search_space:
  time_limit:
    type: categorical
    choices: [60, 120, 300]
  horizon_quantiles:
    type: categorical
    choices: ["0.25-0.5-0.75", "0.2-0.4-0.6-0.8"]
  min_known_per_horizon:
    type: categorical
    choices: [20, 40]
  aggregate_risk:
    type: categorical
    choices: [mean_event_probability, last_event_probability]
default_params:
  presets: null
  time_limit: 120
  realtabpfn_v2_params: {}
  horizon_quantiles: "0.25-0.5-0.75"
  min_known_per_horizon: 20
  aggregate_risk: mean_event_probability
  num_bag_folds: 0
  num_stack_levels: 0
  refit_full: false
  verbosity: 0
