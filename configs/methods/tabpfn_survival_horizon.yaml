method_id: tabpfn_survival_horizon
family: foundation
library: tabpfn
display_name: TabPFN Survival Horizon Frozen
notes: >
  Censored-aware TabPFN classifier adapter. It trains one frozen TabPFN
  classifier per survival horizon using only known event status at that horizon
  and reconstructs monotone survival curves from cumulative event probabilities.
search_space:
  n_estimators:
    type: categorical
    choices: [1, 4, 8]
  fit_mode:
    type: categorical
    choices: [fit_preprocessors, fit_with_cache]
  model_version:
    type: categorical
    choices: [auto, v2, v2.5]
  horizon_quantiles:
    type: categorical
    choices: ["0.25-0.5-0.75", "0.2-0.4-0.6-0.8"]
  min_known_per_horizon:
    type: categorical
    choices: [20, 40]
  aggregate_risk:
    type: categorical
    choices: [mean_event_probability, last_event_probability]
default_params:
  n_estimators: 4
  fit_mode: fit_preprocessors
  model_version: v2.5
  checkpoint_path: null
  horizon_quantiles: "0.25-0.5-0.75"
  min_known_per_horizon: 20
  aggregate_risk: mean_event_probability
  device: auto
  seed: 0
