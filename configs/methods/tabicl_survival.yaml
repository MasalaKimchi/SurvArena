method_id: tabicl_survival
family: foundation
library: autogluon.tabular
display_name: TabICL Event-Risk Survival
notes: >
  Censored-aware direct TabICL horizon classifier adapter. It trains one
  frozen TabICL classifier per survival horizon using only rows with known
  event status at that horizon and reconstructs monotone survival curves from
  cumulative event probabilities.
search_space:
  n_estimators:
    type: categorical
    choices: [1, 4]
  horizon_quantiles:
    type: categorical
    choices: ["0.25-0.5-0.75", "0.2-0.4-0.6-0.8"]
  min_known_per_horizon:
    type: categorical
    choices: [20, 40]
  aggregate_risk:
    type: categorical
    choices: [mean_event_probability, last_event_probability]
default_params:
  n_estimators: 1
  batch_size: 8
  checkpoint_version: tabicl-classifier-v1.1-0506.ckpt
  horizon_quantiles: "0.25-0.5-0.75"
  min_known_per_horizon: 20
  aggregate_risk: mean_event_probability
  device: null
  use_amp: false
  allow_auto_download: true
  seed: 0
  predict_batch_size: null
