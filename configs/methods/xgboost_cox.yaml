method_id: xgboost_cox
family: boosting
library: xgboost
search_space:
  learning_rate:
    type: float
    low: 0.01
    high: 0.3
    log: true
  n_estimators:
    type: int
    low: 100
    high: 600
  max_depth:
    type: int
    low: 2
    high: 8
  min_child_weight:
    type: float
    low: 0.5
    high: 20.0
    log: true
  subsample:
    type: float
    low: 0.5
    high: 1.0
  colsample_bytree:
    type: float
    low: 0.5
    high: 1.0
  reg_lambda:
    type: float
    low: 0.0001
    high: 10.0
    log: true
  reg_alpha:
    type: float
    low: 0.00000001
    high: 1.0
    log: true
default_params:
  learning_rate: 0.05
  n_estimators: 300
  max_depth: 4
  min_child_weight: 1.0
  subsample: 0.8
  colsample_bytree: 0.8
  reg_lambda: 1.0
  reg_alpha: 0.0
  max_bin: 256
  tree_method: hist
  device: cpu
  early_stopping_rounds: 25
  seed: 0
