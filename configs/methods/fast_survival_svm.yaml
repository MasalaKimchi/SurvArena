method_id: fast_survival_svm
family: classical
library: scikit-survival
search_space:
  alpha:
    type: float
    low: 0.001
    high: 10.0
    log: true
  rank_ratio:
    type: float
    low: 0.5
    high: 1.0
  fit_intercept:
    type: categorical
    choices: [false, true]
  max_iter:
    type: int
    low: 50
    high: 500
  tol:
    type: float
    low: 0.000001
    high: 0.01
    log: true
default_params:
  alpha: 1.0
  rank_ratio: 1.0
  fit_intercept: false
  max_iter: 100
  tol: 0.0001
  seed: 0
