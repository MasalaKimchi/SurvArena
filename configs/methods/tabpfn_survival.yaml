method_id: tabpfn_survival
family: foundation
library: tabpfn + scikit-survival
notes: Experimental tabular foundation-model adapter using TabPFN embeddings with a CoxPH survival head.
search_space:
  n_estimators:
    type: categorical
    choices: [4, 8]
  fit_mode:
    type: categorical
    choices: [fit_preprocessors, fit_with_cache]
  model_version:
    type: categorical
    choices: [auto, v2, v2.5]
default_params:
  n_estimators: 8
  fit_mode: fit_preprocessors
  model_version: auto
  checkpoint_path: null
  fine_tune: false
  device: auto
  seed: 0
