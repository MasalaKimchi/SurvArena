method_id: mitra_survival
family: foundation
library: autogluon.tabular + torch + torchsurv
notes: Experimental Mitra survival adapter using AutoGluon Mitra regression predictions with a trainable neural Cox head.
search_space:
  backbone_training:
    type: categorical
    choices: [frozen, finetune]
  presets:
    type: categorical
    choices: [medium, high]
  fine_tune_steps:
    type: int_or_none
    low: 50
    high: 300
  hidden_layers:
    type: categorical
    choices: ["64", "128", "128-64", "256-128"]
  activation:
    type: categorical
    choices: [relu, selu, gelu]
  dropout:
    type: float
    low: 0.0
    high: 0.5
  optimizer:
    type: categorical
    choices: [adamw, adam]
  lr:
    type: float
    low: 0.0001
    high: 0.005
    log: true
  weight_decay:
    type: float
    low: 0.0000001
    high: 0.01
    log: true
  batch_size:
    type: categorical
    choices: [64, 128, 256]
  max_epochs:
    type: int
    low: 50
    high: 250
  patience:
    type: int
    low: 10
    high: 40
default_params:
  backbone_training: frozen
  fine_tune_steps: null
  presets: medium
  time_limit: null
  path: null
  hidden_layers: "128-64"
  activation: relu
  dropout: 0.1
  optimizer: adamw
  lr: 0.001
  weight_decay: 0.0001
  batch_size: 128
  max_epochs: 150
  patience: 20
  device: auto
  seed: 0
