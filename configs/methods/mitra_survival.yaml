method_id: mitra_survival
family: foundation
library: autogluon.tabular MITRA
display_name: Mitra Survival Risk Adapter
notes: >
  AutoGluon Mitra tabular foundation-model adapter for right-censored survival
  benchmarks. It fits Mitra as a binary event-risk model with fine_tune=false
  by default, then calibrates survival curves with Breslow baseline survival.
default_params:
  presets: null
  time_limit: null
  hyperparameters: null
  hyperparameter_tune_kwargs: null
  mitra_params:
    fine_tune: false
    ag.max_memory_usage_ratio: 1.3
  num_bag_folds: 0
  num_stack_levels: 0
  refit_full: false
  verbosity: 0
search_space: {}
